version: "3.9"

services:
  mongo-test:
    image: mongo:7
    container_name: mongo-test
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: testdb
    volumes:
      - mongo_data_test:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-test:
    build:
      context: .
      target: test
    container_name: api-test
    depends_on:
      mongo-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      MONGO_URI: mongodb://mongo-test:27017/samsoul-test
      JWT_SECRET: test-jwt-secret-for-docker-testing

volumes:
  mongo_data_test:

